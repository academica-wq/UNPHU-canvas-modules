<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Módulo 5 - Introducción a la IA en los negocios</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#439441;--pd:#439441cc;--s:#10b981;--d:#ef4444;--li:#f8fafc;--g:#64748b;--dk:#1e293b;--b:#e2e8f0}
body{font-family:'Segoe UI',-apple-system,sans-serif;color:var(--dk);background:var(--li);line-height:1.6}
.mc{max-width:900px;margin:0 auto;padding:40px 20px}
.mh{background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.1);margin-bottom:24px;border-left:6px solid var(--p)}
.mn{display:inline-block;background:var(--p);color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:10px}
.mt{font-size:28px;font-weight:700;margin-bottom:10px}
.md{color:var(--g);font-size:14px}
.ps{background:#fff;padding:16px 24px;border-radius:10px;margin-bottom:24px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.pl{font-size:11px;font-weight:600;color:var(--g);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.pb{width:100%;height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.pf{height:100%;background:var(--p);width:0%;transition:width .4s ease}
.sc{display:flex;flex-direction:column;gap:12px}
.sec{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);transition:box-shadow .3s}
.sec:hover{box-shadow:0 4px 10px rgba(0,0,0,.1)}
.sec.completed{border-left:4px solid var(--s)}
.sh{padding:20px 24px;cursor:pointer;display:flex;align-items:center;gap:14px;user-select:none;transition:background .2s}
.sh:hover{background:var(--li)}
.sn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;background:var(--p);color:#fff;border-radius:8px;font-weight:700;font-size:15px;flex-shrink:0}
.sec.completed .sn{background:var(--s)}
.sw{flex:1}
.st{font-size:16px;font-weight:600;margin-bottom:2px}
.ss{font-size:12px;color:var(--g)}
.sg{font-size:20px;color:var(--g);transition:transform .3s;flex-shrink:0}
.sec.active .sg{transform:rotate(180deg);color:var(--p)}
.scont{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--b)}
.sec.active .scont{max-height:3000px}
.sb{padding:24px}
.cr{line-height:1.8}.cr p{margin-bottom:14px}.cr ul,.cr ol{margin-left:20px;margin-bottom:14px}.cr li{margin-bottom:6px}
.ri{width:100%;min-height:480px;border:1px solid var(--b);border-radius:8px;margin-bottom:12px}
.rt{background:var(--li);padding:14px;border-radius:8px;border-left:4px solid var(--p);margin-top:12px}
.rl{font-size:11px;font-weight:600;color:var(--p);text-transform:uppercase;margin-bottom:6px}
.rlink{display:inline-block;margin-top:12px;padding:10px 20px;background:var(--p);color:#fff;text-decoration:none;border-radius:7px;font-size:13px;font-weight:600}
.qc{display:flex;flex-direction:column;gap:20px}
.qi-intro{background:var(--p);color:#fff;padding:20px;border-radius:8px;font-size:13px}
.qi{background:var(--li);padding:20px;border-radius:8px;border:2px solid transparent;transition:all .3s}
.qi.answered{border-color:var(--s);background:#f0fdf4}
.qn{font-size:11px;font-weight:600;color:var(--p);text-transform:uppercase;margin-bottom:6px}
.qt{font-size:15px;font-weight:600;margin-bottom:14px}
.ao{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;padding:10px 14px;background:#fff;border:2px solid var(--b);border-radius:7px;cursor:pointer;gap:10px;transition:all .2s}
.opt:hover{border-color:var(--p)}
.opt input{accent-color:var(--p);width:17px;height:17px}
.ti{width:100%;padding:10px 14px;border:2px solid var(--b);border-radius:7px;font-size:13px;font-family:inherit}
.ti:focus{outline:none;border-color:var(--p)}
.fb{margin-top:10px;padding:10px 14px;border-radius:7px;font-size:13px;display:none}
.fb.show{display:block}
.fb.ok{background:rgba(16,185,129,.1);border-left:4px solid var(--s);color:#047857}
.fb.info{background:rgba(0,102,204,.1);border-left:4px solid var(--p);color:var(--pd)}
.rl-list{list-style:none;padding:0}
.rl-list li{padding:10px 0;border-bottom:1px solid var(--b);font-size:13px;line-height:1.6}
.rl-list li:last-child{border-bottom:none}
.mf{text-align:center;padding:24px;color:var(--g);font-size:11px;margin-top:32px}
@media(max-width:640px){.mc{padding:16px}.mh{padding:20px}.mt{font-size:22px}.sh{padding:14px}.sb{padding:16px}}
</style>
</head>
<body>
<div class="mc">
<div class="mh">
<div class="mn" id="mn"></div>
<h1 class="mt" id="mt"></h1>
<p class="md" id="md"></p>
</div>
<div class="ps">
<div class="pl">Progreso del módulo</div>
<div class="pb"><div class="pf" id="pf"></div></div>
</div>
<div class="sc" id="sc"></div>
<div class="mf">Los recursos aquí publicados son exclusivos para uso educativo y no tienen fines de lucro.</div>
</div>
<script>
const C={
  "numero": 5,
  "titulo": "Introducción a la IA en los negocios",
  "descripcion": "Explora los fundamentos de la inteligencia artificial y su impacto en las organizaciones modernas. El módulo presenta conceptos básicos, tendencias y aplicaciones empresariales.",
  "color": "#439441",
  "footer": "Los recursos aquí publicados son exclusivos para uso educativo y no tienen fines de lucro.",
  "secciones": [
    {
      "id": "s1",
      "numero": 1,
      "titulo": "¿Qué es la IA?",
      "subtitulo": "Conceptos básicos y aplicaciones empresariales",
      "tipo": "lectura",
      "contenido": "<p>La inteligencia artificial (IA) es una rama de la tecnología que busca desarrollar sistemas capaces de realizar tareas que normalmente requieren inteligencia humana, como analizar información, reconocer patrones, generar contenido o tomar decisiones.</p>\n\n<p>En los negocios, la IA se utiliza para automatizar procesos, mejorar la experiencia del cliente, analizar grandes volúmenes de datos y optimizar la toma de decisiones.</p>\n\n<p>Actualmente, organizaciones de distintos sectores utilizan herramientas de IA para actividades como:</p>\n\n<ul>\n  <li>Automatización de atención al cliente mediante chatbots</li>\n  <li>Análisis predictivo de ventas y comportamiento de consumidores</li>\n  <li>Generación de contenido para marketing y comunicación</li>\n  <li>Optimización de procesos administrativos y operativos</li>\n</ul>\n\n<p>La adopción de IA representa oportunidades importantes para incrementar la eficiencia y la innovación, aunque también plantea desafíos relacionados con la ética, privacidad y transformación del trabajo.</p>"
    },
    {
      "id": "s2",
      "numero": 2,
      "titulo": "Video introductorio: IA en los negocios",
      "subtitulo": "Aplicaciones reales y transformación empresarial",
      "tipo": "recurso",
      "iframeUrl": "https://www.youtube.com/embed/2ePf9rue1Ao",
      "transcripcionTexto": "Este video presenta una introducción práctica al impacto de la inteligencia artificial en el entorno empresarial. Se explican conceptos básicos de IA, ejemplos de automatización, análisis de datos y generación de contenido, así como oportunidades y desafíos para las organizaciones.",
      "linkTranscripcion": "https://www.youtube.com/watch?v=2ePf9rue1Ao",
      "labelTranscripcion": "Ver video completo"
    },
    {
      "id": "s3",
      "numero": 3,
      "titulo": "Ejercicio de autoevaluación",
      "subtitulo": "Evalúa tu comprensión sobre IA en los negocios",
      "tipo": "quiz",
      "quizIntro": "Responde las siguientes preguntas para verificar tu comprensión sobre los conceptos básicos de inteligencia artificial y sus aplicaciones en el entorno empresarial.",
      "preguntas": [
        {
          "id": "q1_s3",
          "pregunta": "Pregunta 1",
          "tipo": "multiple-choice",
          "feedback": "La automatización de atención al cliente es uno de los usos más comunes de la inteligencia artificial en las empresas, especialmente mediante chatbots y asistentes virtuales.",
          "opciones": [
            {
              "id": "a",
              "texto": " Automatización de atención al cliente"
            },
            {
              "id": "b",
              "texto": "Impresión de documentos físicos"
            },
            {
              "id": "c",
              "texto": "Reparación de hardware manual"
            },
            {
              "id": "d",
              "texto": "Construcción de edificios"
            }
          ],
          "respuestaCorrecta": "a"
        },
        {
          "id": "q2_s3",
          "pregunta": "Pregunta 2",
          "tipo": "texto",
          "feedback": "Tu respuesta permite identificar cómo la inteligencia artificial puede aplicarse en contextos reales de negocio. La clave es reconocer cómo la IA puede generar eficiencia, automatización o una mejor experiencia para clientes y usuarios.",
          "esRespuestaAbierta": true
        },
        {
          "id": "q3_s3",
          "pregunta": "La inteligencia artificial puede ayudar a analizar grandes volúmenes de datos para apoyar la toma de decisiones.",
          "tipo": "verdadero-falso",
          "feedback": "La IA permite analizar grandes volúmenes de datos rápidamente para identificar patrones y apoyar la toma de decisiones empresariales.",
          "respuestaCorrecta": true
        }
      ]
    },
    {
      "id": "s4",
      "numero": 4,
      "titulo": "Referencias",
      "subtitulo": "",
      "tipo": "referencias",
      "referencias": [
        {
          "id": "ref1",
          "texto": "Russell, S., & Norvig, P. (2021). Artificial Intelligence: A Modern Approach (4th ed.). Pearson."
        },
        {
          "id": "ref2",
          "texto": "Davenport, T., & Ronanki, R. (2018). Artificial Intelligence for the Real World. Harvard Business Review, 96(1), 108–116."
        },
        {
          "id": "ref3",
          "texto": "Simplilearn. (2023). Artificial Intelligence In 5 Minutes | What Is AI? | Introduction To Artificial Intelligence [Video]. YouTube. https://www.youtube.com/watch?v=2ePf9rue1Ao"
        }
      ]
    }
  ]
};
let R={};
function init(){
  document.getElementById('mn').textContent='Módulo '+C.numero;
  document.getElementById('mt').textContent=C.titulo;
  document.getElementById('md').textContent=C.descripcion;
  const sc=document.getElementById('sc');
  sc.innerHTML='';
  C.secciones.forEach(s=>{
    const el=document.createElement('div');
    el.className='sec';el.id='s_'+s.id;
    el.innerHTML='<div class="sh" onclick="tog(''+s.id+'')"><div class="sn">'+s.numero+'</div><div class="sw"><div class="st">'+s.titulo+'</div><div class="ss">'+(s.subtitulo||'')+'</div></div><div class="sg">▼</div></div><div class="scont"><div class="sb" id="b_'+s.id+'"></div></div>';
    sc.appendChild(el);
    const b=document.getElementById('b_'+s.id);
    if(s.tipo==='lectura'){b.innerHTML='<div class="cr">'+s.contenido+'</div>'}
    else if(s.tipo==='recurso'){b.innerHTML='<div style="text-align:center;padding:16px 0"><iframe class="ri" src="'+s.iframeUrl+'" allowfullscreen></iframe><div class="rt"><div class="rl">Transcripción</div><p style="font-size:13px">'+s.transcripcionTexto+'</p><a href="'+s.linkTranscripcion+'" class="rlink" target="_blank">'+s.labelTranscripcion+'</a></div></div>'}
    else if(s.tipo==='quiz'){b.innerHTML=qHTML(s)}
    else if(s.tipo==='referencias'){b.innerHTML='<ul class="rl-list">'+(s.referencias||[]).map(r=>'<li>'+r.texto+'</li>').join('')+'</ul>'}
  });
  setTimeout(initQ,0);
}
function qHTML(s){
  let h='<div class="qc"><div class="qi-intro">'+s.quizIntro+'</div>';
  (s.preguntas||[]).forEach((p,i)=>{h+='<div class="qi" id="qi_'+p.id+'"><div class="qn">Pregunta '+(i+1)+'</div><div class="qt">'+p.pregunta+'</div><div id="qc_'+p.id+'"></div><div class="fb" id="fb_'+p.id+'"></div></div>'});
  return h+'</div>';
}
function initQ(){
  C.secciones.forEach(s=>{
    (s.preguntas||[]).forEach(p=>{
      const d=document.getElementById('qc_'+p.id);if(!d)return;
      if(p.tipo==='multiple-choice'){
        d.innerHTML='<div class="ao">'+(p.opciones||[]).map(o=>'<label class="opt"><input type="radio" name="'+p.id+'" value="'+o.id+'" onchange="val(''+p.id+'',''+o.id+'','mc')"><span>'+o.texto+'</span></label>').join('')+'</div>';
      }else if(p.tipo==='verdadero-falso'){
        d.innerHTML='<div class="ao"><label class="opt"><input type="radio" name="'+p.id+'" value="true" onchange="val(''+p.id+'','true','vf')"><span>Verdadero</span></label><label class="opt"><input type="radio" name="'+p.id+'" value="false" onchange="val(''+p.id+'','false','vf')"><span>Falso</span></label></div>';
      }else{
        d.innerHTML='<input type="text" class="ti" placeholder="Escribe tu respuesta..." onchange="val(''+p.id+'',this.value,'txt')">';
      }
    });
  });
}
function tog(id){document.getElementById('s_'+id).classList.toggle('active')}
function val(pid,resp,tipo){
  const all=C.secciones.flatMap(s=>s.preguntas||[]);
  const p=all.find(q=>q.id===pid);if(!p)return;
  R[pid]=resp;
  const fb=document.getElementById('fb_'+pid);
  const qi=document.getElementById('qi_'+pid);
  let ok=p.esRespuestaAbierta||(tipo==='vf'?(resp==='true')===p.respuestaCorrecta:resp===p.respuestaCorrecta);
  fb.className='fb show '+(ok?'ok':'info');
  fb.textContent=(ok?'✓ ':'')+p.feedback;
  if(ok)qi.classList.add('answered');
  const total=C.secciones.flatMap(s=>s.preguntas||[]).length;
  document.getElementById('pf').style.width=(total?Object.keys(R).length/total*100:0)+'%';
}
init();
</script>
</body>
</html>
