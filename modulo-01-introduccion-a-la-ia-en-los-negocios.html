<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#1F4E79;--s:#10b981;--li:#f8fafc;--g:#64748b;--dk:#1e293b;--b:#e2e8f0}
body{font-family:"Segoe UI",-apple-system,sans-serif;color:var(--dk);background:var(--li);line-height:1.6}
.mc{max-width:900px;margin:0 auto;padding:40px 20px}
.mh{background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.1);margin-bottom:24px;border-left:6px solid var(--p)}
.mn{display:inline-block;background:var(--p);color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:10px}
.mt{font-size:28px;font-weight:700;margin-bottom:10px}.md{color:var(--g);font-size:14px}
.ps{background:#fff;padding:16px 24px;border-radius:10px;margin-bottom:24px}
.pl{font-size:11px;font-weight:600;color:var(--g);margin-bottom:8px;text-transform:uppercase}
.pb{width:100%;height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.pf{height:100%;background:var(--p);width:0%;transition:width .4s ease}
.sc{display:flex;flex-direction:column;gap:12px}
.sec{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.sec.completed{border-left:4px solid var(--s)}
.sh{padding:20px 24px;cursor:pointer;display:flex;align-items:center;gap:14px;user-select:none;transition:background .2s}
.sh:hover{background:var(--li)}
.sn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;background:var(--p);color:#fff;border-radius:8px;font-weight:700;font-size:15px;flex-shrink:0}
.sec.completed .sn{background:var(--s)}.sw{flex:1}
.st{font-size:16px;font-weight:600;margin-bottom:2px}.ss{font-size:12px;color:var(--g)}
.sg{font-size:20px;color:var(--g);transition:transform .3s;flex-shrink:0}
.sec.active .sg{transform:rotate(180deg);color:var(--p)}
.scont{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--b)}
.sec.active .scont{max-height:3000px}.sb{padding:24px}
.cr{line-height:1.8}.cr p{margin-bottom:14px}.cr ul,.cr ol{margin-left:20px;margin-bottom:14px}.cr li{margin-bottom:6px}
.ri{width:100%;min-height:480px;border:1px solid var(--b);border-radius:8px;margin-bottom:12px}
.rt{background:var(--li);padding:14px;border-radius:8px;border-left:4px solid var(--p);margin-top:12px}
.rl{font-size:11px;font-weight:600;color:var(--p);text-transform:uppercase;margin-bottom:6px}
.rlink{display:inline-block;margin-top:12px;padding:10px 20px;background:var(--p);color:#fff;text-decoration:none;border-radius:7px;font-size:13px;font-weight:600}
.qc{display:flex;flex-direction:column;gap:20px}
.qi-intro{background:var(--p);color:#fff;padding:20px;border-radius:8px;font-size:13px}
.qi{background:var(--li);padding:20px;border-radius:8px;border:2px solid transparent;transition:all .3s}
.qi.answered{border-color:var(--s);background:#f0fdf4}
.qn{font-size:11px;font-weight:600;color:var(--p);text-transform:uppercase;margin-bottom:6px}
.qt{font-size:15px;font-weight:600;margin-bottom:14px}
.ao{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;padding:10px 14px;background:#fff;border:2px solid var(--b);border-radius:7px;cursor:pointer;gap:10px;transition:all .2s}
.opt:hover{border-color:var(--p)}.opt input{accent-color:var(--p);width:17px;height:17px;cursor:pointer}
.ti{width:100%;padding:10px 14px;border:2px solid var(--b);border-radius:7px;font-size:13px;font-family:inherit}
.ti:focus{outline:none;border-color:var(--p)}
.fb{margin-top:10px;padding:10px 14px;border-radius:7px;font-size:13px;display:none}
.fb.show{display:block}
.fb.ok{background:rgba(16,185,129,.1);border-left:4px solid var(--s);color:#047857}
.fb.info{background:rgba(0,102,204,.1);border-left:4px solid var(--p);color:#004a99}
.rl-list{list-style:none;padding:0}
.rl-list li{padding:10px 0;border-bottom:1px solid var(--b);font-size:13px;line-height:1.6}
.rl-list li:last-child{border-bottom:none}
.mf{text-align:center;padding:24px;color:var(--g);font-size:11px;margin-top:32px}
@media(max-width:640px){.mc{padding:16px}.mh{padding:20px}.mt{font-size:22px}}
</style>
</head>

<script>
var C=JSON.parse(document.getElementById("mc_data").textContent);var R={};function init(){var mn=document.getElementById("mn"),mt=document.getElementById("mt"),md=document.getElementById("md"),sc=document.getElementById("sc");if(mn)mn.textContent="Módulo "+C.numero;if(mt)mt.textContent=C.titulo;if(md)md.textContent=C.descripcion;if(!sc)return;sc.innerHTML="";C.secciones.forEach(function(s){var el=document.createElement("div");el.className="sec";el.id="s_"+s.id;el.innerHTML="\u003cdiv class=\"sh\" onclick=\"tog('"+s.id+"')\"\u003e\u003cdiv class=\"sn\"\u003e"+s.numero+"\u003c/div\u003e\u003cdiv class=\"sw\"\u003e\u003cdiv class=\"st\"\u003e"+s.titulo+"\u003c/div\u003e\u003cdiv class=\"ss\"\u003e"+(s.subtitulo||"")+"\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"sg\"\u003e▼\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"scont\"\u003e\u003cdiv class=\"sb\" id=\"b_"+s.id+"\"\u003e\u003c/div\u003e\u003c/div\u003e";sc.appendChild(el);var b=document.getElementById("b_"+s.id);if(s.tipo==="lectura"){b.innerHTML="\u003cdiv class=\"cr\"\u003e"+s.contenido+"\u003c/div\u003e";}else if(s.tipo==="recurso"){b.innerHTML="\u003cdiv style=\"text-align:center;padding:16px 0\"\u003e\u003ciframe class=\"ri\" src=\""+s.iframeUrl+"\" allowfullscreen\u003e\u003c/iframe\u003e\u003cdiv class=\"rt\"\u003e\u003cdiv class=\"rl\"\u003eTranscripción\u003c/div\u003e\u003cp style=\"font-size:13px\"\u003e"+s.transcripcionTexto+"\u003c/p\u003e\u003ca href=\""+s.linkTranscripcion+"\" class=\"rlink\" target=\"_blank\"\u003e"+s.labelTranscripcion+"\u003c/a\u003e\u003c/div\u003e\u003c/div\u003e";}else if(s.tipo==="quiz"){b.innerHTML=qHTML(s);}else if(s.tipo==="referencias"){b.innerHTML="\u003cul class=\"rl-list\"\u003e"+(s.referencias||[]).map(function(r){return"\u003cli\u003e"+r.texto+"\u003c/li\u003e";}).join("")+"\u003c/ul\u003e";}});setTimeout(initQ,0);}function qHTML(s){var h="\u003cdiv class=\"qc\"\u003e\u003cdiv class=\"qi-intro\"\u003e"+s.quizIntro+"\u003c/div\u003e";(s.preguntas||[]).forEach(function(p,i){h+="\u003cdiv class=\"qi\" id=\"qi_"+p.id+"\"\u003e\u003cdiv class=\"qn\"\u003ePregunta "+(i+1)+"\u003c/div\u003e\u003cdiv class=\"qt\"\u003e"+p.pregunta+"\u003c/div\u003e\u003cdiv id=\"qc_"+p.id+"\"\u003e\u003c/div\u003e\u003cdiv class=\"fb\" id=\"fb_"+p.id+"\"\u003e\u003c/div\u003e\u003c/div\u003e";});return h+"\u003c/div\u003e";}function initQ(){C.secciones.forEach(function(s){(s.preguntas||[]).forEach(function(p){var d=document.getElementById("qc_"+p.id);if(!d)return;if(p.tipo==="multiple-choice"){d.innerHTML="\u003cdiv class=\"ao\"\u003e"+(p.opciones||[]).map(function(o){return"\u003clabel class=\"opt\"\u003e\u003cinput type=\"radio\" name=\""+p.id+"\" value=\""+o.id+"\" onchange=\"val('"+p.id+"','"+o.id+"','mc')\"\u003e\u003cspan\u003e"+o.texto+"\u003c/span\u003e\u003c/label\u003e";}).join("")+"\u003c/div\u003e";}else if(p.tipo==="verdadero-falso"){d.innerHTML="\u003cdiv class=\"ao\"\u003e\u003clabel class=\"opt\"\u003e\u003cinput type=\"radio\" name=\""+p.id+"\" value=\"true\" onchange=\"val('"+p.id+"','true','vf')\"\u003e\u003cspan\u003eVerdadero\u003c/span\u003e\u003c/label\u003e\u003clabel class=\"opt\"\u003e\u003cinput type=\"radio\" name=\""+p.id+"\" value=\"false\" onchange=\"val('"+p.id+"','false','vf')\"\u003e\u003cspan\u003eFalso\u003c/span\u003e\u003c/label\u003e\u003c/div\u003e";}else{d.innerHTML="\u003cinput type=\"text\" class=\"ti\" placeholder=\"Escribe tu respuesta...\" onchange=\"val('"+p.id+"',this.value,'txt')\"\u003e";}});});}function tog(id){document.getElementById("s_"+id).classList.toggle("active");}function val(pid,resp,tipo){var all=C.secciones.reduce(function(a,s){return a.concat(s.preguntas||[]);},[]);var p=null;for(var i=0;i\u003call.length;i++){if(all[i].id===pid){p=all[i];break;}}if(!p)return;R[pid]=resp;var fb=document.getElementById("fb_"+pid),qi=document.getElementById("qi_"+pid);var ok=p.esRespuestaAbierta||(tipo==="vf"?(resp==="true")===p.respuestaCorrecta:resp===p.respuestaCorrecta);fb.className="fb show "+(ok?"ok":"info");fb.textContent=(ok?"✓ ":"")+p.feedback;if(ok&&qi)qi.classList.add("answered");var total=C.secciones.reduce(function(a,s){return a+(s.preguntas||[]).length;},0);var pf=document.getElementById("pf");if(pf)pf.style.width=(total?Object.keys(R).length/total*100:0)+"%";}init();
